<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苍穹俱乐部 - 抽签系统</title>
    <style>
        /* ===== Minimal CSS Variables ===== */
        
         :root {
            --lakers-purple: #552583;
            --lakers-gold: #FDB927;
            --dark-bg: #0a0a0f;
            --card-bg: #12121a;
            --text-primary: #ffffff;
            --text-secondary: #b8b8c8;
            --border-radius: 16px;
            --transition: all 0.2s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--dark-bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            line-height: 1.6;
            padding: 16px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(85, 37, 131, 0.3);
        }
        /* Header - Simplified */
        
        .header {
            padding: 24px 32px;
            background: var(--lakers-purple);
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--lakers-gold);
            letter-spacing: 0.5px;
        }
        
        .time-display {
            font-size: 0.9rem;
            opacity: 0.9;
            letter-spacing: 1px;
        }
        /* Navigation - Streamlined */
        
        .nav-tabs {
            padding: 16px 24px;
            background: rgba(85, 37, 131, 0.1);
            border-bottom: 1px solid rgba(85, 37, 131, 0.3);
        }
        
        .tabs {
            display: flex;
            list-style: none;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid rgba(85, 37, 131, 0.5);
            border-radius: 12px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-primary);
            min-width: 110px;
        }
        
        .tab:hover {
            background: rgba(85, 37, 131, 0.2);
            border-color: var(--lakers-gold);
        }
        
        .tab.active {
            background: var(--lakers-gold);
            color: var(--lakers-purple);
            border-color: var(--lakers-gold);
            font-weight: 700;
        }
        /* Content - Clean Layout */
        
        .content {
            padding: 24px 32px;
            min-height: 350px;
        }
        
        .content-section {
            display: none;
        }
        
        .content-section.active {
            display: block;
        }
        
        .rules-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--lakers-gold);
            text-align: center;
        }
        
        .rules-content {
            color: var(--text-secondary);
            line-height: 4;
            font-size: 1rem;
        }
        
        .rules-content br {
            margin-bottom: 30px;
        }
        /* Back button - Subtle */
        
        .back-link {
            display: block;
            text-align: center;
            padding: 16px 32px;
            color: var(--lakers-gold);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            border-top: 1px solid rgba(85, 37, 131, 0.2);
        }
        
        .back-link:hover {
            color: white;
            background: rgba(85, 37, 131, 0.1);
        }
        /* Responsive */
        
        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .content {
                padding: 20px;
            }
            .tab {
                padding: 8px 16px;
                font-size: 0.9rem;
                min-width: 90px;
            }
        }
        
        @media (max-width: 480px) {
            .tabs {
                flex-direction: column;
                align-items: center;
            }
            .tab {
                width: 100%;
                max-width: 200px;
            }
            .header {
                padding: 16px;
            }
            .header h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🏀 苍穹俱乐部抽签系统</h1>
            <div class="time-display" id="currentTime"></div>
        </div>

        <div class="nav-tabs">
            <ul class="tabs">
                <li class="tab active" data-tab="rules">比赛介绍</li>
                <li class="tab" data-tab="captains">抽签队长</li>
                <li class="tab" data-tab="draft">队长抽选秀签区</li>
                <li class="tab" data-tab="groups">小组赛抽签区</li>
            </ul>
        </div>

        <div class="content">
            <!-- 比赛介绍 -->
            <div class="content-section active" id="rules-section">
                <div class="rules-title">《苍穹杯》S系列正赛规则简介</div>
                <div class="rules-content">
                    1、比赛形式-街头3V3;<br> 2、分组规则-赛前随机抽取队长，选秀签，由队长选秀组队;
                    <br> 3、球员：①禁止双内线上场（内线定义为C、C/PF、PF/C）；②每队每场比赛上场的3个球星不可重复；
                    <br> 球星上场限制规则：按球星等级规则来;禁止携带好斗技能（球员天赋技能除外）；
                    <br> 4、严禁代打，违者取消全队成绩，禁赛三届。禁止双切、卡柱子打法。
                </div>
            </div>

            <!-- 抽签队长 -->
            <div class="content-section" id="captains-section">
                <iframe src="0-抽签队长.html" scrolling="no" frameborder="0" width="100%" height="900px" style="border-radius: 12px; overflow: hidden;"></iframe>
            </div>

            <!-- 队长抽选秀签区 -->
            <div class="content-section" id="draft-section">
                <iframe src="1.1-队长首轮抽签.html" scrolling="no" frameborder="0" width="100%" height="750px" style="border-radius: 10px; overflow: hidden; margin-bottom: 16px;"></iframe>
                <iframe src="1.2-队长次轮抽签.html" scrolling="no" frameborder="0" width="100%" height="750px" style="border-radius: 10px; overflow: hidden;"></iframe>
            </div>

            <!-- 小组赛抽签区 -->
            <div class="content-section" id="groups-section">
                <iframe src="2-小组赛抽签.html" scrolling="no" frameborder="0" width="100%" height="750px" style="border-radius: 20px; overflow: scroll;"></iframe>
            </div>
        </div>

        <a href="/" class="back-link" title="返回苍穹俱乐部官网">🏠 返回官网首页</a>
    </div>

    <script>
        // Tab切换功能
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                // 移除所有active状态
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));

                // 添加当前active状态
                tab.classList.add('active');
                const tabId = tab.getAttribute('data-tab');
                document.getElementById(`${tabId}-section`).classList.add('active');
            });
        });

        // 实时时间显示
        function updateCurrentTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            document.getElementById("currentTime").textContent =
                `${year}年${month}月${day}日 ${hours}:${minutes}:${seconds}`;
        }

        setInterval(updateCurrentTime, 1000);
        updateCurrentTime();
    </script>
</body>

</html>
