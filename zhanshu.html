<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏀陶泽如-跑轰战术动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #0a192f, #1a2a6c);
            color: #E6E6E6;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 2.2rem;
            color: #FFD700;
            margin-bottom: 10px;
        }
        
        .specs {
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #C8102E;
        }
        
        .tactic-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        
        .tactic-title {
            color: #FFD700;
            margin-bottom: 20px;
            font-size: 1.6rem;
        }
        
        .tactic-desc {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            line-height: 1.5;
        }
        
        .legend {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin: 20px auto;
            font-size: 0.9rem;
            line-height: 1.4;
            max-width: 600px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
            justify-content: center;
        }
        
        .legend-color {
            width: 15px;
            height: 15px;
            margin-right: 10px;
            border: 1px solid white;
        }
        
        .court-container {
            background: #0a192f;
            border: 2px solid #FFD700;
            border-radius: 10px;
            padding: 20px;
            margin: 0 auto 20px;
            max-width: 600px;
        }
        
        .nba-half-court {
            width: 500px;
            height: 470px;
            position: relative;
            background: linear-gradient(135deg, #f8f4e9, #e8d8b5);
            border: 2px solid white;
            margin: 0 auto;
        }
        
        /* NBA标准球场线条 - 深棕色 */
        .court-line {
            stroke: #5d4037;
            stroke-width: 2;
            fill: none;
        }
        
        /* NBA标准三分线 */
        .three-point-line {
            stroke: #5d4037;
            stroke-width: 2;
            fill: none;
        }
        
        /* 限制区（油漆区） */
        .restricted-area {
            stroke: #5d4037;
            stroke-width: 2;
            fill: none;
        }
        
        /* 罚球区 */
        .free-throw-area {
            stroke: #5d4037;
            stroke-width: 2;
            fill: none;
        }
        
        /* 球员定位容器 - 使用相对定位 */
        .player-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        
        .player {
            position: absolute;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: #0a192f;
            border: 2px solid white;
            transition: all 2s ease;
            z-index: 10;
            /* 使用 transform 进行精确定位，避免布局偏移 */
            transform: translate(-50%, -50%);
        }
        
        .sf { background: #C8102E; }
        .sg { background: #FFD700; }
        .pf { background: #4ECDC4; }
        
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            background: linear-gradient(45deg, #C8102E, #FFD700);
            color: #0a192f;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
        
        .btn:disabled {
            background: #666;
            color: #999;
            cursor: not-allowed;
            transform: none;
        }
        
        .phase-text {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #FFD700;
            font-weight: bold;
        }
        
        /* 动画关键帧 - 战术一NBA标准版 */
        @keyframes tactic1Phase1 {
            0% { left: 46.4%; top: 48.9%; }
            100% { left: 64%; top: 59.6%; }
        }
        
        @keyframes tactic1Phase2 {
            0% { left: 92%; top: 91.5%; }
            100% { left: 64%; top: 59.6%; }
        }
        
        @keyframes tactic1Phase3 {
            0% { left: 3.2%; top: 91.5%; }
            100% { left: 44%; top: 91.5%; }
        }
        
        @keyframes tactic1Phase4 {
            0% { left: 64%; top: 59.6%; }
            100% { left: 92%; top: 91.5%; }
        }
        
        /* 动画关键帧 - 战术二NBA标准版 */
        @keyframes tactic2Phase1 {
            0% { left: 50%; top: 48.9%; }
            100% { left: 50%; top: 48.9%; }
        }
        
        @keyframes tactic2Phase2 {
            0% { left: 50%; top: 48.9%; }
            100% { left: 64%; top: 59.6%; }
        }
        
        @keyframes tactic2Phase3 {
            0% { left: 54%; top: 48.9%; }
            100% { left: 50%; top: 85.1%; }
        }
        
        @keyframes tactic2Phase4 {
            0% { left: 64%; top: 59.6%; }
            100% { left: 92%; top: 91.5%; }
        }
        
        .animate-t1-p1 { animation: tactic1Phase1 2s forwards; }
        .animate-t1-p2 { animation: tactic1Phase2 2s forwards; }
        .animate-t1-p3 { animation: tactic1Phase3 2s forwards; }
        .animate-t1-p4 { animation: tactic1Phase4 2s forwards; }
        
        .animate-t2-p1 { animation: tactic2Phase1 0.5s forwards; }
        .animate-t2-p2 { animation: tactic2Phase2 2s forwards; }
        .animate-t2-p3 { animation: tactic2Phase3 2s forwards; }
        .animate-t2-p4 { animation: tactic2Phase4 2s forwards; }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .container {
                max-width: 100%;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .tactic-section {
                padding: 20px 15px;
                margin-bottom: 20px;
            }
            
            .tactic-title {
                font-size: 1.4rem;
                margin-bottom: 15px;
            }
            
            .tactic-desc {
                padding: 12px;
                margin-bottom: 15px;
                font-size: 1rem;
            }
            
            .legend {
                margin: 15px auto;
                padding: 12px;
                max-width: 90%;
            }
            
            .court-container {
                padding: 15px;
                margin: 0 auto 15px;
            }
            
            .nba-half-court {
                width: 100%;
                max-width: 400px;
                height: auto;
                aspect-ratio: 500/470;
            }
            
            .player {
                width: 6.5%;
                height: auto;
                aspect-ratio: 1/1;
                font-size: 2.2%;
            }
            
            .controls {
                gap: 10px;
                margin-top: 10px;
            }
            
            .btn {
                padding: 8px 16px;
                font-size: 0.9rem;
            }
            
            .phase-text {
                margin-top: 8px;
                font-size: 0.85rem;
            }
            
            .corner-marker {
                width: 1.5%;
                height: auto;
                aspect-ratio: 1/1;
            }
            
            .corner-label {
                font-size: 2%;
            }
        }
        
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            
            .header {
                padding: 15px;
                margin-bottom: 20px;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .specs {
                font-size: 0.8rem;
            }
            
            .tactic-section {
                padding: 15px 10px;
                margin-bottom: 15px;
            }
            
            .tactic-title {
                font-size: 1.2rem;
                margin-bottom: 12px;
            }
            
            .tactic-desc {
                padding: 10px;
                margin-bottom: 12px;
                font-size: 0.95rem;
            }
            
            .legend {
                margin: 12px auto;
                padding: 8px;
                font-size: 0.85rem;
            }
            
            .legend-color {
                width: 12px;
                height: 12px;
                margin-right: 8px;
            }
            
            .court-container {
                padding: 10px;
                margin: 0 auto 12px;
            }
            
            .nba-half-court {
                max-width: 320px;
            }
            
            .player {
                width: 7%;
                font-size: 2.5%;
            }
            
            .controls {
                gap: 8px;
                margin-top: 8px;
            }
            
            .btn {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
            
            .phase-text {
                margin-top: 6px;
                font-size: 0.8rem;
            }
            
            .corner-marker {
                width: 1.8%;
            }
            
            .corner-label {
                font-size: 2.2%;
            }
        }
        
        @media (max-width: 400px) {
            .header h1 {
                font-size: 1.3rem;
            }
            
            .tactic-title {
                font-size: 1.1rem;
            }
            
            .nba-half-court {
                max-width: 280px;
            }
            
            .player {
                width: 7.5%;
                font-size: 2.8%;
            }
            
            .btn {
                padding: 5px 10px;
                font-size: 0.8rem;
            }
            
            .legend {
                font-size: 0.8rem;
            }
            
            .corner-label {
                font-size: 2.4%;
            }
        }
        
        /* 触摸设备优化 */
        @media (hover: none) and (pointer: coarse) {
            .btn {
                min-height: 44px;
                min-width: 44px;
                padding: 12px 20px;
            }
            
            .player {
                touch-action: manipulation;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏀陶泽如-跑轰战术动画</h1>
            <p>战术演示</p>
            <!-- <div class="specs">
                <strong>NBA半场标准：</strong>边线28.65m × 底线15.24m | 三分线7.24m | 罚球线4.57m
            </div> -->
        </div>

        <!-- 战术一：NBA标准版 -->
        <div class="tactic-section">
            <div class="tactic-title">战术一：SF弧顶开球进攻</div>
            <div class="tactic-desc">
                起：SF弧顶持球，SG/PF底角<br>
                攻：SF到SG侧，SG跑45°投篮<br>
                变：没机会，SF跑底角，PF内切
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #C8102E;"></div>
                    <span>SF - 小前锋</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #FFD700;"></div>
                    <span>SG - 得分后卫</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4ECDC4;"></div>
                    <span>PF - 大前锋</span>
                </div>
            </div>
            
            <div class="court-container">
                <div class="nba-half-court" id="court1">
                    <svg width="100%" height="100%" viewBox="0 0 500 470">
                        <!-- 外框 - NBA标准半场 -->
                        <rect x="20" y="20" width="460" height="430" class="court-line"/>
                        
                        <!-- 底角连线 -->
                        <line x1="20" y1="450" x2="480" y2="450" class="court-line"/>
                        
                        <!-- NBA标准三分线 -->
                        <path d="M 70 450 A 215 215 0 0 1 430 450" class="three-point-line"/>
                        <line x1="70" y1="450" x2="20" y2="450" class="three-point-line"/>
                        <line x1="430" y1="450" x2="480" y2="450" class="three-point-line"/>
                        
                        <!-- 限制区 -->
                        <rect x="155" y="20" width="190" height="430" class="restricted-area"/>
                        
                        <!-- 罚球区 -->
                        <circle cx="250" cy="450" r="180" class="free-throw-area"/>
                        <!-- <line x1="155" y1="200" x2="345" y2="260" class="free-throw-area"/> -->
                        
                        <!-- 中圈上半部分 -->
                        <circle cx="250" cy="450" r="90" class="court-line"/>
                    </svg>
                    
                    <!-- 底角标记 -->
                    <!-- <div class="corner-marker" style="left: 3.2%; top: 94.9%;"></div>
                    <div class="corner-label" style="left: 0.4%; top: 91.5%;">左底角</div>
                    
                    <div class="corner-marker" style="left: 95.2%; top: 94.9%;"></div>
                    <div class="corner-label" style="left: 92%; top: 91.5%;">右底角</div> -->
                    
                    <!-- 球员容器 -->
                    <div class="player-container">
                        <!-- 初始位置：SF弧顶，SG/PF底角 -->
                        <div class="player sf" id="t1-sf" style="left: 46.4%; top: 48.9%;">SF</div>
                        <div class="player sg" id="t1-sg" style="left: 92%; top: 91.5%;">SG</div>
                        <div class="player pf" id="t1-pf" style="left: 8%; top: 91.5%;">PF</div>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn" id="t1-play">▶ 播放</button>
                <button class="btn" id="t1-reset" disabled>↺ 重置</button>
            </div>
            
            <div class="phase-text" id="t1-phase">准备开始...</div>
        </div>

        <!-- 战术二：NBA标准版 -->
        <div class="tactic-section">
            <div class="tactic-title">战术二：SG弧顶传球配合</div>
            <div class="tactic-desc">
                起：SG弧顶持球，SF/PF高位<br>
                传：SG传球给SF，SF持球进攻<br>
                终：SF看机会传PF内切或SG底角
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #C8102E;"></div>
                    <span>SF - 小前锋</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #FFD700;"></div>
                    <span>SG - 得分后卫</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4ECDC4;"></div>
                    <span>PF - 大前锋</span>
                </div>
            </div>
            
            <div class="court-container">
                <div class="nba-half-court" id="court2">
                    <svg width="100%" height="100%" viewBox="0 0 500 470">
                        <!-- 外框 - NBA标准半场 -->
                        <rect x="20" y="20" width="460" height="430" class="court-line"/>
                        
                        <!-- 底角连线 -->
                        <line x1="20" y1="450" x2="480" y2="450" class="court-line"/>
                        
                        <!-- NBA标准三分线 -->
                        <path d="M 70 450 A 215 215 0 0 1 430 450" class="three-point-line"/>
                        <line x1="70" y1="450" x2="20" y2="450" class="three-point-line"/>
                        <line x1="430" y1="450" x2="480" y2="450" class="three-point-line"/>
                        
                        <!-- 限制区 -->
                        <rect x="155" y="20" width="190" height="430" class="restricted-area"/>
                        
                        <!-- 罚球区 -->
                        <circle cx="250" cy="450" r="180" class="free-throw-area"/>
                        <!-- <line x1="155" y1="260" x2="345" y2="260" class="free-throw-area"/> -->
                        
                        <!-- 中圈上半部分 -->
                        <circle cx="250" cy="450" r="90" class="court-line"/>
                    </svg>
                    
                    <!-- 底角标记 -->
                    <!-- <div class="corner-marker" style="left: 3.2%; top: 94.9%;"></div>
                    <div class="corner-label" style="left: 0.4%; top: 91.5%;">左底角</div>
                    
                    <div class="corner-marker" style="left: 95.2%; top: 94.9%;"></div>
                    <div class="corner-label" style="left: 92%; top: 91.5%;">右底角</div> -->
                    
                    <!-- 球员容器 -->
                    <div class="player-container">
                        <!-- 初始位置：SG弧顶持球，SF/PF高位 -->
                        <div class="player sg" id="t2-sg" style="left: 50%; top: 48.9%;">SG</div>
                        <div class="player sf" id="t2-sf" style="left: 60%; top: 48.9%;">SF</div>
                        <div class="player pf" id="t2-pf" style="left: 54%; top: 48.9%;">PF</div>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn" id="t2-play">▶ 播放</button>
                <button class="btn" id="t2-reset" disabled>↺ 重置</button>
            </div>
            
            <div class="phase-text" id="t2-phase">准备开始...</div>
        </div>
    </div>

    <script>
        // 战术动画控制逻辑
        document.addEventListener('DOMContentLoaded', function() {
            console.log('NBA标准战术动画页面已加载');
            console.log('结合了NBA标准半场绘图和精准战术动画');
            
            // 战术一控制（NBA标准版）
            let tactic1Playing = false;
            
            function playTactic1() {
                if (tactic1Playing) return;
                
                tactic1Playing = true;
                const playBtn = document.getElementById('t1-play');
                const resetBtn = document.getElementById('t1-reset');
                const phaseText = document.getElementById('t1-phase');
                
                if (playBtn && resetBtn && phaseText) {
                    playBtn.disabled = true;
                    resetBtn.disabled = true;
                    phaseText.textContent = '执行中...';
                    
                    const sfElement = document.getElementById('t1-sf');
                    const sgElement = document.getElementById('t1-sg');
                    const pfElement = document.getElementById('t1-pf');
                    
                    // 阶段1: SF向SG侧移动
                    if (sfElement) {
                        sfElement.classList.add('animate-t1-p1');
                    }
                    
                    // 阶段2: SG从右底角跑向45°
                    if (sgElement) {
                        sgElement.classList.add('animate-t1-p2');
                    }
                    
                    // 阶段3: PF从左底角内切到篮板下
                    if (pfElement) {
                        pfElement.classList.add('animate-t1-p3');
                    }
                    
                    // 阶段4: 如果没机会，SF跑回右底角
                    setTimeout(() => {
                        if (sfElement) {
                            sfElement.classList.remove('animate-t1-p1');
                            sfElement.classList.add('animate-t1-p4');
                        }
                    }, 1000);
                    
                    // 动画完成后
                    setTimeout(() => {
                        if (phaseText && resetBtn) {
                            phaseText.textContent = '✅ 执行完成！';
                            resetBtn.disabled = false;
                        }
                        tactic1Playing = false;
                    }, 2000);
                }
            }
            
            function resetTactic1() {
                const elements = ['t1-sf', 't1-sg', 't1-pf'];
                elements.forEach(id => {
                    const element = document.getElementById(id);
                    if (element) {
                        element.className = element.className.replace(/animate-\w+/g, '').trim();
                    }
                });
                
                // 重置位置
                const sfElement = document.getElementById('t1-sf');
                const sgElement = document.getElementById('t1-sg');
                const pfElement = document.getElementById('t1-pf');
                const phaseText = document.getElementById('t1-phase');
                const playBtn = document.getElementById('t1-play');
                const resetBtn = document.getElementById('t1-reset');
                
                if (sfElement) {
                    sfElement.style.left = '46.4%';
                    sfElement.style.top = '48.9%';
                }
                if (sgElement) {
                    sgElement.style.left = '92%';
                    sgElement.style.top = '91.5%';
                }
                if (pfElement) {
                    pfElement.style.left = '8%';
                    pfElement.style.top = '91.5%';
                }
                
                if (phaseText && playBtn && resetBtn) {
                    phaseText.textContent = '已重置';
                    playBtn.disabled = false;
                    resetBtn.disabled = true;
                }
            }
            
            // 战术二控制（NBA标准版）
            let tactic2Playing = false;
            
            function playTactic2() {
                if (tactic2Playing) return;
                
                tactic2Playing = true;
                const playBtn = document.getElementById('t2-play');
                const resetBtn = document.getElementById('t2-reset');
                const phaseText = document.getElementById('t2-phase');
                
                if (playBtn && resetBtn && phaseText) {
                    playBtn.disabled = true;
                    resetBtn.disabled = true;
                    phaseText.textContent = '执行中...';
                    
                    const sgElement = document.getElementById('t2-sg');
                    const sfElement = document.getElementById('t2-sf');
                    const pfElement = document.getElementById('t2-pf');
                    
                    // 阶段2: SF持球向右侧进攻
                    setTimeout(() => {
                        if (sfElement) {
                            sfElement.classList.add('animate-t2-p2');
                        }
                    }, 500);
                    
                    // 阶段3: PF内切到篮板下
                    setTimeout(() => {
                        if (pfElement) {
                            pfElement.classList.add('animate-t2-p3');
                        }
                    }, 500);
                    
                    // 阶段4: SG跑向右底角准备接球
                    setTimeout(() => {
                        if (sgElement) {
                            sgElement.classList.add('animate-t2-p4');
                        }
                    }, 1000);
                    
                    // 动画完成后
                    setTimeout(() => {
                        if (phaseText && resetBtn) {
                            phaseText.textContent = '✅ 执行完成！';
                            resetBtn.disabled = false;
                        }
                        tactic2Playing = false;
                    }, 2500);
                }
            }
            
            function resetTactic2() {
                const elements = ['t2-sg', 't2-sf', 't2-pf'];
                elements.forEach(id => {
                    const element = document.getElementById(id);
                    if (element) {
                        element.className = element.className.replace(/animate-\w+/g, '').trim();
                    }
                });
                
                // 重置位置
                const sgElement = document.getElementById('t2-sg');
                const sfElement = document.getElementById('t2-sf');
                const pfElement = document.getElementById('t2-pf');
                const phaseText = document.getElementById('t2-phase');
                const playBtn = document.getElementById('t2-play');
                const resetBtn = document.getElementById('t2-reset');
                
                if (sgElement) {
                    sgElement.style.left = '50%';
                    sgElement.style.top = '48.9%';
                }
                if (sfElement) {
                    sfElement.style.left = '60%';
                    sfElement.style.top = '48.9%';
                }
                if (pfElement) {
                    pfElement.style.left = '54%';
                    pfElement.style.top = '48.9%';
                }
                
                if (phaseText && playBtn && resetBtn) {
                    phaseText.textContent = '已重置';
                    playBtn.disabled = false;
                    resetBtn.disabled = true;
                }
            }
            
            // 绑定事件监听器
            const t1PlayBtn = document.getElementById('t1-play');
            const t1ResetBtn = document.getElementById('t1-reset');
            const t2PlayBtn = document.getElementById('t2-play');
            const t2ResetBtn = document.getElementById('t2-reset');
            
            if (t1PlayBtn) {
                t1PlayBtn.addEventListener('click', playTactic1);
            }
            if (t1ResetBtn) {
                t1ResetBtn.addEventListener('click', resetTactic1);
            }
            if (t2PlayBtn) {
                t2PlayBtn.addEventListener('click', playTactic2);
            }
            if (t2ResetBtn) {
                t2ResetBtn.addEventListener('click', resetTactic2);
            }
        });
    </script>
</body>
</html>
